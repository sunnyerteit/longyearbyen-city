<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Longyearbyen — City Builder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg:#1F2326; --bg2:#292E32; --bg3:#33393E;
    --text:#F2F4F2; --muted:#9BA3A8; --accent:#E8B340;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:-apple-system,"Segoe UI",sans-serif;background:#111;}
  #app{display:flex;flex-direction:column;height:100vh;}

  header{
    background:var(--bg);color:var(--text);
    padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    border-bottom:2px solid var(--bg2);flex-shrink:0;position:relative;z-index:1000;
  }
  .brand{font-weight:800;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;}
  .brand span{display:block;font-weight:400;font-size:9px;letter-spacing:2px;color:var(--muted);}
  .sep{width:1px;height:28px;background:var(--bg2);flex-shrink:0;}

  .btn{
    background:var(--bg2);color:var(--text);border:2px solid transparent;
    border-radius:5px;padding:5px 12px;font-size:11.5px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:5px;white-space:nowrap;transition:border-color .1s,transform .1s;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn.active{border-color:var(--accent);}
  .btn i{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0;}

  .day-lbl{
    font-family:"SF Mono",Consolas,monospace;font-size:11.5px;
    background:var(--bg2);color:var(--text);padding:5px 10px;
    border-radius:5px;min-width:56px;text-align:center;
  }
  .spd{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
  .spd input{width:70px;accent-color:var(--accent);}

  .stats{
    margin-left:auto;display:flex;gap:12px;flex-wrap:wrap;
    font-family:"SF Mono",Consolas,monospace;font-size:11.5px;
  }
  .stat{display:flex;align-items:center;gap:5px;color:var(--text);}
  .stat i{width:8px;height:8px;border-radius:50%;}
  .stat.muted{color:var(--muted);}
  .stat.cap{color:var(--accent);font-weight:700;padding-left:10px;border-left:1px solid var(--bg2);}

  #map-wrap{position:relative;flex:1;overflow:hidden;}
  #map{position:absolute;inset:0;}

  /* Night overlay */
  #night{position:absolute;inset:0;pointer-events:none;z-index:400;background:rgba(8,14,32,0);}

  /* Inspector */
  #insp{
    position:absolute;z-index:1000;width:210px;
    background:var(--bg);color:var(--text);
    border:1px solid var(--bg2);border-radius:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.55);
    padding:11px 13px;font-size:12px;display:none;
  }
  .it{display:flex;justify-content:space-between;align-items:center;
      font-weight:700;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;margin-bottom:7px;}
  .ic{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0;}
  .ic:hover{color:var(--text);}
  .ib.muted{color:var(--muted);font-style:italic;line-height:1.5;font-size:11.5px;}
  .ir{display:flex;justify-content:space-between;padding:2px 0;}
  .ir span{color:var(--muted);}

  footer{
    background:var(--bg);color:var(--muted);font-size:11px;
    text-align:center;padding:6px;border-top:2px solid var(--bg2);flex-shrink:0;
  }
  footer b{color:var(--text);}

  .leaflet-control-attribution{font-size:10px;background:rgba(31,35,38,.8)!important;color:#9BA3A8!important;}
  .leaflet-control-attribution a{color:var(--accent)!important;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">Longyearbyen<span>city builder</span></div>
    <div class="sep"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="tools">
      <button class="btn active" data-zone="unzoned"><i style="background:#A8ACAE"></i>Clear</button>
      <button class="btn" data-zone="residential"><i style="background:#B5483D"></i>Residential</button>
      <button class="btn" data-zone="commercial"><i style="background:#D4A23A"></i>Commercial</button>
      <button class="btn" data-zone="industrial"><i style="background:#46606B"></i>Industrial</button>
      <button class="btn" data-zone="inspect">🔍 Inspect</button>
    </div>
    <div class="sep"></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="day-lbl" id="dayLbl">Day 0</span>
      <span class="day-lbl" id="clkLbl">07:00</span>
      <button class="btn" id="playBtn">▶ Play</button>
      <label class="spd">Speed <input type="range" id="spdSlider" min="1" max="10" value="4"></label>
    </div>
    <div class="stats" id="stats">
      <span class="stat"><i style="background:#B5483D"></i>Res 0</span>
      <span class="stat"><i style="background:#D4A23A"></i>Com 0</span>
      <span class="stat"><i style="background:#46606B"></i>Ind 0</span>
      <span class="stat cap">Pop 0 / 2800</span>
    </div>
  </header>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="night"></div>
    <div id="insp"></div>
  </div>

  <footer>
    Click a plot to zone it · <b>🔍 Inspect</b> for details · <b>▶ Play</b> starts the simulation
  </footer>
</div>

// ═══════════════════════════════════════════════════════════════
// PARSE FEATURES INTO PLOTS + ROAD LINES
// ═══════════════════════════════════════════════════════════════
const rawRoads  = [];
const rawPlots  = [];

GEOJSON.features.forEach(f => {
  if (f.properties.mode === 'road') {
    rawRoads.push(f.geometry.coordinates.map(([lng,lat]) => ({ lat, lng })));
  } else {
    // deduplicate by coordinate fingerprint
    const key = JSON.stringify(f.geometry.coordinates[0]);
    if (!rawPlots.find(p => p._key === key)) {
      rawPlots.push({
        id:   f.properties.id,
        name: f.properties.name,
        // GeoJSON coords are [lng, lat]
        coords: f.geometry.coordinates[0].map(([lng,lat]) => [lat, lng]),
        _key: key,
        zone: 'unzoned', level:1, satisfaction:0,
        dataReady:false, inventory:0,
        residents:[], workers:[],
        upStreak:0, downStreak:0,
        // centroid
        get cx(){ return this.coords.reduce((s,c)=>s+c[0],0)/this.coords.length; },
        get cy(){ return this.coords.reduce((s,c)=>s+c[1],0)/this.coords.length; },
      });
    }
  }
});

// ═══════════════════════════════════════════════════════════════
// ROAD GRAPH — sample each road polyline into nodes every ~30m,
// then connect adjacent samples and detect intersections.
// ═══════════════════════════════════════════════════════════════
const M_LAT = 111320;
function mPerLng(lat){ return 111320 * Math.cos(lat * Math.PI/180); }
function distM(a, b){
  const dy=(b.lat-a.lat)*M_LAT, dx=(b.lng-a.lng)*mPerLng(a.lat);
  return Math.sqrt(dx*dx+dy*dy);
}

// Build a flat list of nodes and edges from the road polylines
const roadNodes  = {};   // key -> { lat, lng, id }
const roadEdges  = [];   // [idA, idB, distM]
let   _nodeSeq   = 0;

function nodeKey(lat, lng){ return lat.toFixed(6)+','+lng.toFixed(6); }

function getOrMakeNode(lat, lng){
  const k = nodeKey(lat, lng);
  if (!roadNodes[k]){
    roadNodes[k] = { id:'N'+(++_nodeSeq), lat, lng };
  }
  return roadNodes[k];
}

rawRoads.forEach(pts => {
  // Resample at ~30 m intervals
  const sampled = [pts[0]];
  for (let i=1;i<pts.length;i++){
    const prev = sampled[sampled.length-1], next = pts[i];
    const d = distM(prev, next);
    const steps = Math.max(1, Math.round(d/30));
    for (let s=1;s<=steps;s++){
      sampled.push({
        lat: prev.lat + (next.lat-prev.lat)*s/steps,
        lng: prev.lng + (next.lng-prev.lng)*s/steps
      });
    }
  }
  // Register each sample as a node and link consecutive ones
  let prevNode = null;
  sampled.forEach(pt => {
    const node = getOrMakeNode(pt.lat, pt.lng);
    if (prevNode && prevNode.id !== node.id){
      const d = distM(prevNode, node);
      roadEdges.push([prevNode.id, node.id, d]);
    }
    prevNode = node;
  });
});

// Airport — register as a proper road node (first point of S1, already exists).
const AIRPORT_LL = rawRoads[0][0];
const airportNode = getOrMakeNode(AIRPORT_LL.lat, AIRPORT_LL.lng);
const airportPseudo = {
  id:'airport', cx: AIRPORT_LL.lat, cy: AIRPORT_LL.lng,
  accessNode: airportNode.id
};

// Build nodeList/adj/nodeById AFTER all getOrMakeNode calls (roads + airport).
const nodeList = Object.values(roadNodes);
const adj = {};
nodeList.forEach(n => { adj[n.id] = []; });
roadEdges.forEach(([a,b,d]) => {
  adj[a].push({to:b, d});
  adj[b].push({to:a, d});
});
const nodeById = {};
nodeList.forEach(n => { nodeById[n.id] = n; });

// Dijkstra — returns { dist, prev } maps
function dijkstra(startId){
  const dist={}, prev={};
  nodeList.forEach(n => { dist[n.id]=Infinity; });
  dist[startId]=0;
  const rem = new Set(nodeList.map(n=>n.id));
  while(rem.size){
    let u=null, best=Infinity;
    rem.forEach(id=>{ if(dist[id]<best){best=dist[id];u=id;} });
    if(u===null||dist[u]===Infinity) break;
    rem.delete(u);
    (adj[u]||[]).forEach(e=>{
      const alt=dist[u]+e.d;
      if(alt<dist[e.to]){ dist[e.to]=alt; prev[e.to]=u; }
    });
  }
  return {dist, prev};
}

function tracePath(prev, startId, endId){
  const path=[endId]; let cur=endId;
  while(cur!==startId){
    cur=prev[cur];
    if(cur===undefined) return null;
    path.unshift(cur);
  }
  return path;
}

// Each plot's access node = nearest road node
const plotById = {};
rawPlots.forEach(p => {
  let best=null, bestD=Infinity;
  nodeList.forEach(n=>{
    const d=distM({lat:p.cx,lng:p.cy},{lat:n.lat,lng:n.lng});
    if(d<bestD){bestD=d;best=n;}
  });
  p.accessNode = best ? best.id : null;
  plotById[p.id] = p;
});

// Cache Dijkstra from each unique access node (lazy)
const _djCache = {};
function getDj(nodeId){
  if(!_djCache[nodeId]) _djCache[nodeId] = dijkstra(nodeId);
  return _djCache[nodeId];
}

function plotDistM(p1, p2){
  if(!p1.accessNode||!p2.accessNode) return Infinity;
  return getDj(p1.accessNode).dist[p2.accessNode] ?? Infinity;
}

function buildWaypoints(fromPlot, toPlot){
  if(!fromPlot.accessNode||!toPlot.accessNode)
    return [{lat:fromPlot.cx,lng:fromPlot.cy},{lat:toPlot.cx,lng:toPlot.cy}];
  const {prev} = getDj(fromPlot.accessNode);
  const path = tracePath(prev, fromPlot.accessNode, toPlot.accessNode);
  if(!path) return [{lat:fromPlot.cx,lng:fromPlot.cy},{lat:toPlot.cx,lng:toPlot.cy}];
  const pts = [{lat:fromPlot.cx,lng:fromPlot.cy}];
  path.forEach(nid => {
    const n = nodeById[nid];  // fast lookup, no O(n) key scan
    if(n) pts.push({lat:n.lat,lng:n.lng});
  });
  pts.push({lat:toPlot.cx,lng:toPlot.cy});
  return pts;
}

function pathLenM(pts){
  let t=0;
  for(let i=1;i<pts.length;i++) t+=distM(pts[i-1],pts[i]);
  return t;
}
function pointAt(pts,frac){
  if(!pts||!pts.length) return null;
  const total=pathLenM(pts); let target=total*Math.max(0,Math.min(1,frac));
  for(let i=1;i<pts.length;i++){
    const seg=distM(pts[i-1],pts[i]);
    if(target<=seg||i===pts.length-1){
      const f=seg>0?Math.min(1,target/seg):0;
      return {lat:pts[i-1].lat+(pts[i].lat-pts[i-1].lat)*f, lng:pts[i-1].lng+(pts[i].lng-pts[i-1].lng)*f};
    }
    target-=seg;
  }
  return pts[pts.length-1];
}

// ═══════════════════════════════════════════════════════════════
// DRAW ROADS ON MAP
// ═══════════════════════════════════════════════════════════════
rawRoads.forEach(pts => {
  L.polyline(pts.map(p=>[p.lat,p.lng]), { color:'#5A5248', weight:4, opacity:0.7 }).addTo(map);
});

// ═══════════════════════════════════════════════════════════════
// DRAW PLOTS ON MAP — as Leaflet polygons (clickable)
// ═══════════════════════════════════════════════════════════════
const ZONE_COLOR = {
  unzoned:'#A8ACAE', residential:'#B5483D', commercial:'#D4A23A', industrial:'#46606B'
};
const zones = {};

function plotFill(p){
  const z=zones[p.id]||'unzoned';
  if(z==='unzoned') return '#C8A96A';
  const base=ZONE_COLOR[z];
  return shadeHex(base, -(p.level-1)*0.15);
}
function plotStroke(p){
  const z=zones[p.id]||'unzoned';
  if(z==='unzoned') return {color:'rgba(0,0,0,0.25)',w:1};
  if(p.satisfaction>=70) return {color:'#E8B340',w:2.5};
  if(p.satisfaction<=30) return {color:'#C23B3B',w:2.5};
  return {color:'rgba(0,0,0,0.3)',w:1.5};
}
function shadeHex(hex,frac){
  const f=parseInt(hex.slice(1),16),t=frac<0?0:255,p=Math.abs(frac);
  const R=f>>16,G=(f>>8)&0xFF,B=f&0xFF;
  return '#'+(0x1000000+Math.round((t-R)*p+R)*0x10000+Math.round((t-G)*p+G)*0x100+Math.round((t-B)*p+B)).toString(16).slice(1);
}

const plotLayers = {};
rawPlots.forEach(p => {
  const latlngs = p.coords.map(([la,ln])=>[la,ln]);
  const s = plotStroke(p);
  const layer = L.polygon(latlngs, {
    color: s.color, weight: s.w,
    fillColor: plotFill(p), fillOpacity: 0.75,
    interactive: true
  }).addTo(map);
  layer.on('click', L.DomEvent.stopPropagation);
  layer.on('click', () => handlePlotClick(p));
  plotLayers[p.id] = layer;
});

function refreshPlotStyle(p){
  const layer = plotLayers[p.id]; if(!layer) return;
  const s = plotStroke(p);
  layer.setStyle({ color:s.color, weight:s.w, fillColor:plotFill(p), fillOpacity:0.75 });
}

// ═══════════════════════════════════════════════════════════════
// ECONOMY
// ═══════════════════════════════════════════════════════════════
const CAPACITY = { residential:[8,16,28], commercial:[16,30,50], industrial:[18,34,56] };
function capacityOf(p){ const z=zones[p.id]||'unzoned'; return z==='unzoned'?0:CAPACITY[z][p.level-1]; }
const ROAD_REACH_M=15000, POLLUTION_REACH_M=400;
function inReach(p1,p2){ return plotDistM(p1,p2)<=ROAD_REACH_M; }
function stockCap(p){ return capacityOf(p)*2; }
const UPT=70, DWT=30, STREAK=4;
function applyStreak(p,s){
  if(s>=UPT){p.upStreak=(p.upStreak||0)+1;p.downStreak=0;if(p.upStreak>=STREAK&&p.level<3){p.level++;p.upStreak=0;}}
  else if(s<=DWT){p.downStreak=(p.downStreak||0)+1;p.upStreak=0;if(p.downStreak>=STREAK&&p.level>1){p.level--;p.downStreak=0;}}
  else{p.upStreak=0;p.downStreak=0;}
}
function weightedSum(zf,fp,reach){
  let t=0;
  rawPlots.forEach(q=>{if((zones[q.id]||'unzoned')!==zf)return;const w=Math.max(0,1-plotDistM(fp,q)/reach);if(w>0)t+=capacityOf(q)*w;});
  return t;
}

// ═══════════════════════════════════════════════════════════════
// LIFE EVENTS — set false to disable all evening/night flavour
// ═══════════════════════════════════════════════════════════════
const LIFE_EVENTS = true;

// ═══════════════════════════════════════════════════════════════
// AGENTS
// ═══════════════════════════════════════════════════════════════
const agents=new Map(); let nextAid=1;
const SHOP_CHANCE=0.65;

function mkSched(){
  const se=0.22+Math.random()*0.12, twe=se+0.045+Math.random()*0.03,
        we=twe+0.20+Math.random()*0.16, tse=we+0.035+Math.random()*0.025,
        spe=tse+0.03+Math.random()*0.02, the=spe+0.04+Math.random()*0.03;
  return {sleepEnd:se,toWorkEnd:twe,workEnd:we,toShopEnd:tse,shopEnd:spe,toHomeEnd:the};
}
function mkAgent(homeId){
  const id='a'+(nextAid++);
  agents.set(id,{id,homeId,jobId:null,shopId:null,visible:false,
    isNew:true,       // on arrival day: walk airport→home, then rest
    daysInCity:0,     // 0 = arrived today, routine starts at 1+
    arrivalTime:simTime, // simTime when this agent was born — walk starts here
    legPhase:null,legPts:null,legLen:0,schedule:mkSched(),
    shopsToday:false, // no shopping on arrival day
    jLat:(Math.random()-.5)*0.00003,jLng:(Math.random()-.5)*0.00005,
    iWanted:0,iBought:0,
    // Evening life (assigned each day in runDay if LIFE_EVENTS)
    lingers:false, lingerEnd:0,           // linger outside home after toHome
    eveningWalk:false, ewStart:0, ewEnd:0, ewPts:null, // short road walk
    socialVisit:false, svStart:0, svEnd:0, svTarget:null, // visit neighbour
  });
  return agents.get(id);
}
function layOff(id){
  const a=agents.get(id);if(!a||!a.jobId)return;
  const j=plotById[a.jobId];if(j)j.workers=j.workers.filter(w=>w!==id);a.jobId=null;
}
function evict(id){
  const a=agents.get(id);if(!a)return;
  if(a.jobId)layOff(id);
  const h=plotById[a.homeId];if(h)h.residents=h.residents.filter(r=>r!==id);
  agents.delete(id);
}
function trim(p){
  const z=zones[p.id]||'unzoned';
  if(z==='residential'){const cap=capacityOf(p);while(p.residents.length>cap){const id=p.residents.pop();const a=agents.get(id);if(a){if(a.jobId){const j=plotById[a.jobId];if(j)j.workers=j.workers.filter(w=>w!==id);}agents.delete(id);}}}
  else if(z==='commercial'||z==='industrial'){const cap=capacityOf(p);while(p.workers.length>cap){const id=p.workers.pop();const a=agents.get(id);if(a)a.jobId=null;}}
}

const ARRIVE=15, VIS_CAP=150;
let visIds=[], newToday=[];

function refreshVis(){
  visIds.forEach(id=>{const a=agents.get(id);if(a){a.visible=false;a.legPhase=null;a.legPts=null;}});
  const all=Array.from(agents.keys()), pri=newToday.slice(0,VIS_CAP);
  const pool=all.filter(id=>!pri.includes(id));
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const chosen=pri.concat(pool).slice(0,VIS_CAP);
  chosen.forEach(id=>{const a=agents.get(id);if(a){a.visible=true;a.legPhase=null;a.legPts=null;}});
  visIds=chosen;
}

// ═══════════════════════════════════════════════════════════════
// SIMULATION
// ═══════════════════════════════════════════════════════════════
let day=0;
function runDay(){
  day++;
  rawPlots.forEach(p=>{if((zones[p.id]||'unzoned')!=='unzoned')trim(p);});
  // Age all existing agents; new arrivals start at daysInCity=0 (set in mkAgent)
  agents.forEach(a=>{ if(!a.isNew) a.daysInCity++; });

  // Roll shopping intent only for settled residents
  agents.forEach(a=>{ if(a.daysInCity>0) a.shopsToday=Math.random()<SHOP_CHANCE; });

  newToday=[];let left=ARRIVE;
  for(const p of rawPlots){
    if(left<=0)break;if((zones[p.id]||'unzoned')!=='residential')continue;
    const cap=capacityOf(p);
    while(p.residents.length<cap&&left>0){const a=mkAgent(p.id);p.residents.push(a.id);newToday.push(a.id);left--;}
  }
  // Mark new agents as no longer "isNew" so daysInCity will increment next day
  newToday.forEach(id=>{const a=agents.get(id);if(a)a.isNew=false;});

  // Job assignment: only for settled agents (daysInCity >= 1)
  agents.forEach(a=>{
    if(a.daysInCity<1)return;
    if(a.jobId)return;const h=plotById[a.homeId];if(!h)return;
    let best=null,bestD=Infinity;
    rawPlots.forEach(p=>{const z=zones[p.id]||'unzoned';if(z!=='commercial'&&z!=='industrial')return;if(p.workers.length>=capacityOf(p))return;if(!inReach(h,p))return;const d=plotDistM(h,p);if(d<bestD){bestD=d;best=p;}});
    if(best){best.workers.push(a.id);a.jobId=best.id;}
  });

  // Shop assignment: only for settled agents
  agents.forEach(a=>{
    if(a.daysInCity<1){a.shopId=null;return;}
    const h=plotById[a.homeId];if(!h){a.shopId=null;return;}
    let best=null,bestD=Infinity;
    rawPlots.forEach(p=>{if((zones[p.id]||'unzoned')!=='commercial')return;if(!inReach(h,p))return;const d=plotDistM(h,p);if(d<bestD){bestD=d;best=p;}});
    a.shopId=best?best.id:null;
  });

  rawPlots.forEach(p=>{const z=zones[p.id]||'unzoned';if(z==='commercial'||z==='industrial'){const cap=capacityOf(p);p.workforceRatio=cap>0?p.workers.length/cap:0;}});

  rawPlots.forEach(p=>{
    if((zones[p.id]||'unzoned')!=='industrial')return;
    const max=capacityOf(p),prod=0.2+0.8*((p.satisfaction||0)/100);
    p.producedToday=max*prod*p.workforceRatio;
    p.inventory=Math.min(stockCap(p),(p.inventory||0)+p.producedToday);
  });

  rawPlots.forEach(p=>{if((zones[p.id]||'unzoned')==='commercial')p.restockedToday=0;});
  rawPlots.forEach(p=>{if((zones[p.id]||'unzoned')==='industrial')p.soldToday=0;});
  rawPlots.forEach(c=>{
    if((zones[c.id]||'unzoned')!=='commercial')return;
    const sc=stockCap(c),room=sc-(c.inventory||0);if(room<=0)return;
    const pr=0.2+0.8*((c.satisfaction||0)/100);let want=Math.min(room,sc*pr*c.workforceRatio);if(want<=0)return;
    rawPlots.forEach(ind=>{if(want<=0)return;if((zones[ind.id]||'unzoned')!=='industrial')return;if(!inReach(c,ind))return;const tr=Math.min(ind.inventory||0,want);if(tr>0){ind.inventory-=tr;ind.soldToday=(ind.soldToday||0)+tr;c.inventory=(c.inventory||0)+tr;c.restockedToday=(c.restockedToday||0)+tr;want-=tr;}});
  });

  rawPlots.forEach(p=>{if((zones[p.id]||'unzoned')==='commercial')p.soldToday=0;});
  rawPlots.forEach(p=>{if((zones[p.id]||'unzoned')==='residential')p.boughtToday=0;});
  agents.forEach(a=>{
    const h=plotById[a.homeId];if(!h){a.iWanted=0;a.iBought=0;return;}
    const tier=(h.satisfaction||0)>=80?3:((h.satisfaction||0)>=50?2:1);a.iWanted=tier;
    let bought=0;const shop=a.shopId?plotById[a.shopId]:null;
    if(shop&&(zones[shop.id]||'unzoned')==='commercial'){bought=Math.min(shop.inventory||0,tier);if(bought>0){shop.inventory-=bought;shop.soldToday=(shop.soldToday||0)+bought;}}
    a.iBought=bought;h.boughtToday=(h.boughtToday||0)+bought;
  });

  rawPlots.forEach(p=>{
    const z=zones[p.id]||'unzoned';
    if(z==='commercial'){
      // Satisfaction requires BOTH staff AND actual sales.
      // Full staff with zero sales = 0 satisfaction (empty shelves).
      const sc=stockCap(p);
      const saleFrac=sc>0?Math.min(1,(p.soldToday||0)/sc):0;
      const s=Math.max(0,Math.min(100,p.workforceRatio*saleFrac*100));
      p.satisfaction=s;p.dataReady=true;applyStreak(p,s);
    }
    else if(z==='industrial'){
      // Industry: workforce drives production, sales validate output.
      const max=capacityOf(p);
      const saleFrac=max>0?Math.min(1,(p.soldToday||0)/max):0;
      const s=Math.max(0,Math.min(100,p.workforceRatio*40+saleFrac*60));
      p.satisfaction=s;p.dataReady=true;applyStreak(p,s);
    }
  });
  rawPlots.forEach(p=>{
    if((zones[p.id]||'unzoned')!=='residential')return;
    const res=p.residents.map(id=>agents.get(id)).filter(Boolean);
    let emp=0,fill=0;
    res.forEach(a=>{if(a.jobId)emp++;fill+=a.iWanted>0?a.iBought/a.iWanted:1;});
    const n=res.length,er=n>0?emp/n:0,af=n>0?fill/n:0;
    const pol=weightedSum('industrial',p,POLLUTION_REACH_M);
    const s=Math.max(0,Math.min(100,15+er*45+af*45-pol*0.25));
    p.satisfaction=s;p.dataReady=true;applyStreak(p,s);
  });

  rawPlots.forEach(p=>refreshPlotStyle(p));

  // ── LIFE EVENTS: assign evening behaviours for settled agents ──
  if(LIFE_EVENTS){
    agents.forEach(a=>{
      // Reset each day
      a.lingers=false; a.eveningWalk=false; a.socialVisit=false;
      if(a.daysInCity<1) return;
      const h=plotById[a.homeId]; if(!h) return;
      const s=a.schedule;
      const homeTime=s.toHomeEnd; // when they normally go inside

      // 1. LINGERER: 40% idle outside home 20–60 sim-min after toHome
      if(Math.random()<0.40){
        a.lingers=true;
        a.lingerEnd=homeTime+(0.014+Math.random()*0.028); // ~20–60 min
      }

      // 2. EVENING WALK: 60% take a walk along nearest road at ~18:00–22:00
      if(Math.random()<0.60){
        const s1pts=rawRoads[0];
        let bestIdx=0,bestD=Infinity;
        s1pts.forEach((pt,i)=>{const d=distM(pt,{lat:h.cx,lng:h.cy});if(d<bestD){bestD=d;bestIdx=i;}});
        // Walk forward or backward up to 12 nodes
        const goForward=Math.random()<0.5;
        const stride=Math.floor(4+Math.random()*8);
        const endIdx=goForward
          ? Math.min(s1pts.length-1, bestIdx+stride)
          : Math.max(0, bestIdx-stride);
        if(endIdx!==bestIdx){
          const slice=goForward
            ? s1pts.slice(bestIdx,endIdx+1)
            : s1pts.slice(endIdx,bestIdx+1).reverse();
          const outPts=slice.map(p=>({lat:p.lat,lng:p.lng}));
          const backPts=[...outPts].reverse();
          a.ewPts=[...outPts,...backPts.slice(1)];
          const ewStart=0.72+Math.random()*0.14; // ~17:17–20:45
          const ewLen=pathLenM(a.ewPts);
          const ewDur=Math.min(0.12,ewLen/WALK);
          a.eveningWalk=true;
          a.ewStart=ewStart;
          a.ewEnd=ewStart+ewDur;
        }
      }

      // 3. SOCIAL VISIT: 45% visit a residential neighbour within 600m
      if(Math.random()<0.45){
        let nearPlot=null,nearD=Infinity;
        rawPlots.forEach(q=>{
          if(q.id===h.id||(zones[q.id]||'unzoned')!=='residential') return;
          const d=distM({lat:h.cx,lng:h.cy},{lat:q.cx,lng:q.cy});
          if(d<600&&d<nearD){nearD=d;nearPlot=q;}
        });
        if(nearPlot){
          const svStart=0.78+Math.random()*0.12; // ~18:43–21:35
          const svDur=0.04+Math.random()*0.04;   // ~58–115 min visit
          a.socialVisit=true;
          a.svStart=svStart;
          a.svEnd=svStart+svDur+0.025; // +travel back
          a.svTarget=nearPlot;
        }
      }
    });
  }

  refreshVis();
  updateStats();
  if(inspId){const p=rawPlots.find(pl=>pl.id===inspId);if(p)openInsp(p);}
}

// ═══════════════════════════════════════════════════════════════
// AGENT ANIMATION
// ═══════════════════════════════════════════════════════════════
const WALK=400;
function phase(a,t){
  const s=a.schedule;
  if(t<s.sleepEnd)return'sleep';if(t<s.toWorkEnd)return'toWork';if(t<s.workEnd)return'working';
  if(!a.shopsToday)return t<s.toHomeEnd?'toHome':'evening';
  if(t<s.toShopEnd)return'toShop';if(t<s.shopEnd)return'shopping';
  if(t<s.toHomeEnd)return'toHome';return'evening';
}
function legDur(len,win){return win<=0?0:Math.min(win,len/WALK);}

// Agent color logic:
// toWork / working / toHome-from-work → destination/origin zone color
// toShop / shopping / toHome-from-shop → residential color (they're residents)
// sleep (arriving) → residential color
// evening / no movement → residential color
function agentColor(a, ph){
  const workZone = a.jobId ? (zones[a.jobId]||'unzoned') : null;
  if(ph==='toWork') return workZone ? ZONE_COLOR[workZone] : ZONE_COLOR.residential;
  if(ph==='working') return workZone ? ZONE_COLOR[workZone] : ZONE_COLOR.residential;
  if(ph==='toHome'){
    // Coming back from work (no shopping) → work zone color fading home
    if(!a.shopsToday && workZone) return ZONE_COLOR[workZone];
    // Coming back from shop → residential
    return ZONE_COLOR.residential;
  }
  // toShop, shopping, sleep-arrival, evening → residential
  return ZONE_COLOR.residential;
}

function resolvePos(a,t){
  const h=plotById[a.homeId];if(!h)return null;

  // ── ARRIVAL DAY: walk S1 from airport, exit at nearest S1 node to home ──
  if(a.daysInCity===0){
    if(a.legPhase!=='arriving'){
      a.legPhase='arriving';
      // Build arrival path: all S1 points up to the one closest to home, then straight to home centroid
      const s1pts = rawRoads[0]; // S1 is the first road (airport→sentrum)
      let bestIdx=0, bestD=Infinity;
      s1pts.forEach((pt,i)=>{
        const d=distM(pt,{lat:h.cx,lng:h.cy});
        if(d<bestD){bestD=d;bestIdx=i;}
      });
      const pts = s1pts.slice(0, bestIdx+1).map(p=>({lat:p.lat,lng:p.lng}));
      pts.push({lat:h.cx,lng:h.cy});
      a.legPts=pts;
      a.legLen=pathLenM(a.legPts);
    }
    const remaining=1.0-a.arrivalTime;
    const walkDur=Math.min(remaining, a.legLen/WALK);
    const elapsed=t-a.arrivalTime;
    if(elapsed<0||elapsed>=walkDur) return null; // not yet born or already inside
    const pos=pointAt(a.legPts, walkDur>0 ? elapsed/walkDur : 1);
    return {lat:pos.lat+a.jLat,lng:pos.lng+a.jLng,color:ZONE_COLOR.residential};
  }

  // ── SETTLED AGENT: normal daily routine ──
  const w=a.jobId?plotById[a.jobId]:h;
  const sh=a.shopId?plotById[a.shopId]:w;
  const s=a.schedule,ph=phase(a,t);
  const hasJob=!!a.jobId,shops=a.shopsToday;
  const origin=shops?sh:w,hadReason=shops||hasJob;

  if(ph!==a.legPhase){
    a.legPhase=ph;
    if(ph==='toWork'&&hasJob)a.legPts=buildWaypoints(h,w);
    else if(ph==='toShop'&&shops)a.legPts=buildWaypoints(w,sh);
    else if(ph==='toHome'&&hadReason)a.legPts=buildWaypoints(origin,h);
    else a.legPts=null;
    a.legLen=a.legPts?pathLenM(a.legPts):0;
  }

  let pos=null;

  // Phases where agent is INSIDE a building → check life events before hiding
  if(ph==='sleep'||ph==='working'||ph==='shopping') return null;

  if(ph==='evening'||ph==='toHome'){
    // toHome movement
    if(ph==='toHome'&&hadReason){
      const ws=shops?s.shopEnd:s.workEnd;
      const dur=legDur(a.legLen,s.toHomeEnd-ws);
      pos=pointAt(a.legPts,dur>0?(t-ws)/dur:1);
    }

    if(LIFE_EVENTS){
      // Still outside lingering?
      if(a.lingers&&t<a.lingerEnd){
        return {lat:h.cx+a.jLat,lng:h.cy+a.jLng,color:ZONE_COLOR.residential};
      }
      // Evening walk?
      if(a.eveningWalk&&t>=a.ewStart&&t<=a.ewEnd&&a.ewPts){
        const frac=(t-a.ewStart)/(a.ewEnd-a.ewStart);
        const wp=pointAt(a.ewPts,frac);
        if(wp) return {lat:wp.lat+a.jLat,lng:wp.lng+a.jLng,color:ZONE_COLOR.residential};
      }
      // Social visit?
      if(a.socialVisit&&a.svTarget&&t>=a.svStart&&t<=a.svEnd){
        const half=(a.svStart+a.svEnd)/2;
        if(t<half){
          // walking there (straight line, it's nearby)
          const frac=(t-a.svStart)/(half-a.svStart);
          return {
            lat:h.cx+(a.svTarget.cx-h.cx)*frac+a.jLat,
            lng:h.cy+(a.svTarget.cy-h.cy)*frac+a.jLng,
            color:ZONE_COLOR.residential
          };
        } else {
          // at neighbour or walking back
          const frac=(t-half)/(a.svEnd-half);
          if(frac<0.4){
            // sitting inside neighbour's building — hidden
            return null;
          }
          return {
            lat:a.svTarget.cx+(h.cx-a.svTarget.cx)*((frac-0.4)/0.6)+a.jLat,
            lng:a.svTarget.cy+(h.cy-a.svTarget.cy)*((frac-0.4)/0.6)+a.jLng,
            color:ZONE_COLOR.residential
          };
        }
      }
    }

    if(ph==='evening') return null; // inside home
  }

  if(ph==='toWork'&&hasJob){const dur=legDur(a.legLen,s.toWorkEnd-s.sleepEnd);pos=pointAt(a.legPts,dur>0?(t-s.sleepEnd)/dur:1);}
  else if(ph==='toShop'&&shops){const dur=legDur(a.legLen,s.toShopEnd-s.workEnd);pos=pointAt(a.legPts,dur>0?(t-s.workEnd)/dur:1);}

  if(!pos)return null;
  return {lat:pos.lat+a.jLat,lng:pos.lng+a.jLng,color:agentColor(a,ph)};
}

function drawAgents(){
  while(gAgents.firstChild)gAgents.removeChild(gAgents.firstChild);

  visIds.forEach(id=>{
    const a=agents.get(id);if(!a||!a.visible)return;
    const pos=resolvePos(a,simTime);if(!pos)return;
    const pt=map.latLngToLayerPoint([pos.lat,pos.lng]);
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);
    c.setAttribute('r','3');c.setAttribute('fill',pos.color||ZONE_COLOR.residential);
    c.style.pointerEvents='none';
    gAgents.appendChild(c);
  });
}
map.on('move zoom viewreset',()=>{ if(!paused) drawAgents(); });

// ═══════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════
function updateStats(){
  const ct={unzoned:0,residential:0,commercial:0,industrial:0};
  const ss={residential:0,commercial:0,industrial:0};
  let pop=0,jobs=0,emp=0;
  rawPlots.forEach(p=>{const z=zones[p.id]||'unzoned';ct[z]++;
    if(z==='residential'){pop+=p.residents.length;ss.residential+=p.satisfaction;}
    if(z==='commercial'){jobs+=capacityOf(p);ss.commercial+=p.satisfaction;}
    if(z==='industrial'){jobs+=capacityOf(p);ss.industrial+=p.satisfaction;}
  });
  agents.forEach(a=>{if(a.jobId)emp++;});
  const avg=(s,n)=>n>0?Math.round(s/n):0;
  document.getElementById('stats').innerHTML=`
    <span class="stat"><i style="background:#B5483D"></i>Res ${ct.residential} · ${avg(ss.residential,ct.residential)}%</span>
    <span class="stat"><i style="background:#D4A23A"></i>Com ${ct.commercial} · ${avg(ss.commercial,ct.commercial)}%</span>
    <span class="stat"><i style="background:#46606B"></i>Ind ${ct.industrial} · ${avg(ss.industrial,ct.industrial)}%</span>
    <span class="stat muted"><i style="background:#A8ACAE"></i>Unzoned ${ct.unzoned}</span>
    <span class="stat cap">Pop ${pop} / 2800 · Jobs ${emp}/${jobs}</span>`;
}

// ═══════════════════════════════════════════════════════════════
// INSPECTOR
// ═══════════════════════════════════════════════════════════════
const inspEl=document.getElementById('insp');
let inspId=null;

function statusW(s){return s>=UPT?'Thriving':s<=DWT?'Struggling':'Stable';}
function inspHtml(p){
  const z=zones[p.id]||'unzoned';
  const cl=`<button class="ic" id="inspClose">&times;</button>`;
  if(z==='unzoned')return`<div class="it">${p.name||p.id}${cl}</div><div class="ib muted">Unzoned — click a zone tool then this plot.</div>`;
  const hd=`<div class="it">${p.name||p.id} · ${z.charAt(0).toUpperCase()+z.slice(1)} Lv${p.level}${cl}</div>`;
  if(!p.dataReady)return hd+`<div class="ib muted">Zoned today — data available tomorrow.</div>`;
  let body=`<div class="ir"><span>Satisfaction</span><b>${Math.round(p.satisfaction)}% · ${statusW(p.satisfaction)}</b></div>`;
  if(z==='residential'){const res=p.residents.map(id=>agents.get(id)).filter(Boolean),ep=res.filter(a=>a.jobId).length;body+=`<div class="ir"><span>Inhabitants</span><b>${res.length}/${capacityOf(p)}</b></div><div class="ir"><span>Employed</span><b>${ep}/${res.length}</b></div><div class="ir"><span>Bought today</span><b>${Math.round(p.boughtToday||0)}</b></div>`;}
  else if(z==='commercial'){body+=`<div class="ir"><span>Workers</span><b>${p.workers.length}/${capacityOf(p)}</b></div><div class="ir"><span>Inventory</span><b>${Math.round(p.inventory||0)}/${stockCap(p)}</b></div><div class="ir"><span>Sold today</span><b>${Math.round(p.soldToday||0)}</b></div>`;}
  else if(z==='industrial'){body+=`<div class="ir"><span>Workers</span><b>${p.workers.length}/${capacityOf(p)}</b></div><div class="ir"><span>Produced</span><b>${Math.round(p.producedToday||0)}</b></div><div class="ir"><span>Sold</span><b>${Math.round(p.soldToday||0)}</b></div>`;}
  return hd+`<div class="ib">${body}</div>`;
}
function closeInsp(){inspEl.style.display='none';inspId=null;}
function openInsp(p){
  inspId=p.id; inspEl.innerHTML=inspHtml(p);
  document.getElementById('inspClose').onclick=closeInsp;
  const pt=map.latLngToContainerPoint([p.cx,p.cy]);
  let left=pt.x+14,top=pt.y-80;
  const wrap=document.getElementById('map-wrap');
  if(left+220>wrap.clientWidth)left=pt.x-230;
  top=Math.max(8,Math.min(wrap.clientHeight-180,top));
  inspEl.style.left=left+'px';inspEl.style.top=top+'px';inspEl.style.display='block';
}

// ═══════════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════════
let currentTool='unzoned';

function handlePlotClick(p){
  if(currentTool==='inspect'){openInsp(p);return;}
  const prev=zones[p.id]||'unzoned';
  if(prev===currentTool)return;
  if(prev==='residential')p.residents.slice().forEach(id=>evict(id));
  else if(prev==='commercial'||prev==='industrial')p.workers.slice().forEach(id=>layOff(id));
  zones[p.id]=currentTool;
  p.level=1;p.satisfaction=0;p.upStreak=0;p.downStreak=0;p.dataReady=false;p.inventory=0;p.residents=[];p.workers=[];
  refreshPlotStyle(p);
  updateStats();
}

document.querySelectorAll('#tools .btn[data-zone]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#tools .btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');currentTool=btn.dataset.zone;
    if(currentTool!=='inspect')closeInsp();
  });
});

map.on('click',()=>{if(currentTool==='inspect')closeInsp();});

document.getElementById('playBtn').addEventListener('click',e=>{
  paused=!paused;e.target.textContent=paused?'▶ Play':'⏸ Pause';
  e.target.classList.toggle('active',!paused);lastTs=null;
});
document.getElementById('spdSlider').addEventListener('input',e=>{speed=+e.target.value;});

// ═══════════════════════════════════════════════════════════════
// NIGHT OVERLAY
// ═══════════════════════════════════════════════════════════════
const nightEl=document.getElementById('night');
function updateNight(){
  const b=(Math.cos((simTime-0.5)*2*Math.PI)+1)/2;
  nightEl.style.background=`rgba(8,14,32,${(0.5*(1-b)).toFixed(3)})`;
}

// ═══════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════
let simTime=0.3,speed=4,paused=true,lastTs=null;
const BASE_SEC=60;

function updateClock(){
  const m=Math.floor(simTime*24*60);
  document.getElementById('clkLbl').textContent=String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
  document.getElementById('dayLbl').textContent='Day '+day;
}

function tick(ts){
  if(lastTs===null)lastTs=ts;
  const dt=ts-lastTs;lastTs=ts;
  if(!paused){simTime+=(dt/1000)/(BASE_SEC/speed);if(simTime>=1){simTime-=1;runDay();}}
  updateClock();updateNight();drawAgents();
  requestAnimationFrame(tick);
}

updateStats();
requestAnimationFrame(tick);
</script>
